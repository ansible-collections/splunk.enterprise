---
name: "Collection SonarCloud and Changelog"

concurrency:
  group: ${{ github.head_ref || github.run_id }}-checks
  cancel-in-progress: true

on: # yamllint disable-line rule:truthy
  pull_request_target:
    branches: [main]

jobs:
  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main

  sonar:
    name: SonarCloud
    uses: ansible/ansible-content-actions/.github/workflows/sonarcloud.yaml@main
    with:
      python_version: "3.12"
      sonar_scanner_java_opts: "-Xss2m"
    secrets:
      SONAR_TOKEN: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}
