---
name: "Integration Tests"

concurrency:
  group: ${{ github.actor == 'pre-commit-ci[bot]' && format('integration-bot-{0}', github.run_id) || 'integration' }}
  cancel-in-progress: true

on:
  pull_request_target:
    branches: [main]
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - "plugins/**"
      - "tests/integration/**"
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  check-actor:
    name: Check Actor
    if: >-
      github.event_name == 'pull_request_target' &&
      github.actor != 'pre-commit-ci[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Actor ${{ github.actor }} is allowed to run integration tests"

  safe-to-test:
    needs:
      - check-actor
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      needs.check-actor.result == 'success' &&
      (github.event.label.name == 'safe to test' ||
      github.event.action != 'labeled')
    uses: ansible-network/github_actions/.github/workflows/safe-to-test.yml@main

  integration:
    name: "${{ matrix.ansible_version }} / ${{ matrix.node_id }}"
    runs-on: ["rhel", "${{ matrix.node_id }}"]
    env:
      PYTHON_VERSION: "3.12"
    environment:
      name: >-
        ${{
          github.event_name == 'schedule' && 'eco-splunk-daily' ||
          github.event_name == 'workflow_dispatch' && 'eco-splunk-daily' ||
          'eco-splunk-protected'
        }}
    needs:
      - check-actor
      - safe-to-test
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (needs.check-actor.result == 'success' &&
         (needs.safe-to-test.result == 'success' || needs.safe-to-test.result == 'skipped'))
      )
    strategy:
      fail-fast: false
      matrix:
        ansible_version:
          - stable-2.16
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
        node_id:
          - rhel8
          - rhel9
          - rhel10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: ansible_collections/splunk/enterprise
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: |
          sudo dnf install -y "python${PYTHON_VERSION}" "python${PYTHON_VERSION}-pip"

      - name: Create virtualenv
        run: |
          "python${PYTHON_VERSION}" -m venv ~/venv-runner
          source ~/venv-runner/bin/activate
          pip install --upgrade pip

      - name: Install ansible-core (${{ matrix.ansible_version }})
        run: |
          source ~/venv-runner/bin/activate
          pip install "git+https://github.com/ansible/ansible.git@${{ matrix.ansible_version }}"

      - name: Install collection dependencies
        run: |
          source ~/venv-runner/bin/activate
          ansible-galaxy collection install ansible.netcommon ansible.utils -p ./ansible_collections

      - name: Run integration tests
        working-directory: ansible_collections/splunk/enterprise
        run: |
          source ~/venv-runner/bin/activate
          ansible-test integration -vvv --color yes

      - name: Clean up virtualenv
        if: always()
        run: rm -rf ~/venv-runner
