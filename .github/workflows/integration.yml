---
name: "Integration Tests"

concurrency:
  group: ${{ github.actor == 'pre-commit-ci[bot]' && format('integration-bot-{0}', github.run_id) || 'integration' }}
  cancel-in-progress: true

on:
  pull_request_target:
    branches: [main]
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - "plugins/**"
      - "tests/integration/**"
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  check-actor:
    name: Check Actor
    if: >-
      github.event_name == 'pull_request_target' &&
      github.actor != 'pre-commit-ci[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Actor ${{ github.actor }} is allowed to run integration tests"

  safe-to-test:
    needs:
      - check-actor
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      needs.check-actor.result == 'success' &&
      (github.event.label.name == 'safe to test' ||
      github.event.action != 'labeled')
    uses: ansible-network/github_actions/.github/workflows/safe-to-test.yml@main

  integration:
    name: "py${{ matrix.python_version }} / ${{ matrix.ansible_version }} / ${{ matrix.node_id }}"
    runs-on: ["rhel", "${{ matrix.node_id }}"]
    environment:
      name: >-
        ${{
          github.event_name == 'schedule' && 'eco-splunk-daily' ||
          github.event_name == 'workflow_dispatch' && 'eco-splunk-daily' ||
          'eco-splunk-protected'
        }}
    needs:
      - check-actor
      - safe-to-test
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (needs.check-actor.result == 'success' &&
         (needs.safe-to-test.result == 'success' || needs.safe-to-test.result == 'skipped'))
      )
    strategy:
      fail-fast: false
      matrix:
        # https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-support-matrix
        # 2.16 supports Python 3.10-3.12
        # 2.17 supports Python 3.10-3.12
        # 2.18 supports Python 3.11-3.13
        # 2.19 supports Python 3.11-3.13
        # 2.20 supports Python 3.12-3.14
        # 2.21 supports Python 3.12-3.14
        ansible_version:
          - stable-2.16
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
        node_id:
          - rhel8
          - rhel9
          - rhel10
        include:
          - ansible_version: stable-2.16
            python_version: "3.10"
          - ansible_version: stable-2.17
            python_version: "3.10"
          - ansible_version: stable-2.18
            python_version: "3.11"
          - ansible_version: stable-2.19
            python_version: "3.11"
          - ansible_version: stable-2.20
            python_version: "3.12"
          - ansible_version: stable-2.21
            python_version: "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: ansible_collections/splunk/enterprise
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      # One dnf transaction per matrix job, only for that job's interpreter (not all Pythons every time).
      - name: Install Python ${{ matrix.python_version }} (dnf)
        run: |
          sudo dnf install -y "python${{ matrix.python_version }}" "python${{ matrix.python_version }}-pip"

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install ansible-core (${{ matrix.ansible_version }})
        run: |
          python${{ matrix.python_version }} -m pip install "git+https://github.com/ansible/ansible.git@${{ matrix.ansible_version }}"

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install ansible.netcommon ansible.utils -p ./ansible_collections

      - name: Run integration tests
        working-directory: ansible_collections/splunk/enterprise
        run: |
          ansible-test integration -v --color yes
