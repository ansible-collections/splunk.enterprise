---
name: Run collection certification checks

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: cert-ver-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  call:
    uses: oraNod/partner-certification-checker/.github/workflows/certification-reusable.yml@python-core-versions # zizmor: ignore[unpinned-uses]
